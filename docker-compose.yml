version: '3.8'

services:
  backend:
    build: ./server
    container_name: estoque-backend
    ports:
      - "3333:3333"
    volumes:
      - ./server/prisma:/app/prisma
      - ./server/uploads:/app/uploads
      - ./server/dev.db:/app/dev.db
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    restart: always

  frontend:
    build: ./web
    container_name: estoque-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
